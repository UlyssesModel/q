name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  rust:
    name: Rust (fmt / clippy / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf-compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo build target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/*.rs', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-target-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Assert default build is clean
        # Default features only. Guards against an accidental opt-in to the
        # gated secure dependency. See scripts/check-default-build-clean.sh.
        run: bash scripts/check-default-build-clean.sh

      - name: Test (lib + bins)
        run: cargo test --workspace --lib --bins

      - name: Test (integration, single-threaded to avoid TIME_WAIT exhaustion)
        run: cargo test --workspace --tests -- --test-threads=1
        timeout-minutes: 5

  bun:
    name: Bun typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            bench-ts/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bench-ts/bun.lockb', 'bench-ts/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        working-directory: bench-ts
        run: bun install

      - name: Typecheck
        working-directory: bench-ts
        run: bun run typecheck

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        run: docker compose build kirk-server

      - name: Build bench image
        run: docker compose build bench

  feature-isolation:
    name: Feature isolation (secret-kirk-edge must not resolve)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Assert default build is clean
        # Verifies that the secret-kirk-edge crate is NOT present in
        # cargo metadata or Cargo.lock under default features.
        # Fails with exit 1 if the gated dep resolves — guards against
        # accidental feature activation in CI or Docker.
        run: bash scripts/check-default-build-clean.sh

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        # RUSTSEC-2024-0436: paste crate unmaintained — transitively pulled
        # by tonic/nalgebra; no exploitable vulnerability, tracked and ignored.
        run: cargo audit --ignore RUSTSEC-2024-0436
